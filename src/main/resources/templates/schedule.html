<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>일정 목록</title>
</head>

<body>

<h1>일정 목록</h1>

<form action="/schedule/ai" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <input type="text" name="message" placeholder="예: 내일 오후 3시에 회의 추가">
    <button type="submit">AI 일정 추가</button>
</form>

<hr>

<table border="1">

    <tr>
        <th>제목</th>
        <th>날짜</th>
        <th>시간</th>
        <th>카테고리</th>
    </tr>

    <tr th:each="schedule : ${scheduleList}">

        <td th:text="${schedule.title}"></td>

        <td th:text="${schedule.date}"></td>

        <td th:text="${schedule.startTime}"></td>

        <td th:text="${schedule.category}"></td>

    </tr>

</table>

</body>
</html>
