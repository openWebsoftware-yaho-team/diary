<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TEAM YAHO - 월간 캘린더</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <header th:replace="~{fragments/header :: header}"></header>

    <main class="main-content">
        <div class="section-title">월간 캘린더</div>

        <div class="calendar-controls">
            <button id="btn-prev-month" class="btn-cal-nav">◀</button>
            <h2 id="calendar-month-year" class="calendar-title">202X년 X월</h2>
            <button id="btn-next-month" class="btn-cal-nav">▶</button>
        </div>

        <div class="calendar-wrapper">
            <div class="calendar-header-row">
                <div class="cal-day-name text-red">일</div>
                <div class="cal-day-name">월</div>
                <div class="cal-day-name">화</div>
                <div class="cal-day-name">수</div>
                <div class="cal-day-name">목</div>
                <div class="cal-day-name">금</div>
                <div class="cal-day-name text-blue">토</div>
            </div>
            <div id="calendar-body" class="calendar-grid"></div>
        </div>

        <div id="calendar-data" style="display:none">
            <div th:each="schedule : ${scheduleList}"
                 class="cal-raw-data"
                 th:data-id="${schedule.id}"
                 th:data-title="${schedule.title}"
                 th:data-date="${schedule.date}"
                 th:data-time="${schedule.startTime}">
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <script src="/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const calBody   = document.getElementById('calendar-body');
            const titleEl   = document.getElementById('calendar-month-year');
            const dataBox   = document.getElementById('calendar-data');
            const colorPool = ['bg-pastel-green', 'bg-pastel-yellow', 'bg-pastel-blue', 'bg-pastel-orange', 'bg-pastel-purple'];

            let cur = new Date();

            function draw(date) {
                calBody.innerHTML = '';

                const y = date.getFullYear();
                const m = date.getMonth();
                titleEl.textContent = `${y}년 ${m + 1}월`;

                const firstDow = new Date(y, m, 1).getDay();
                const lastDay  = new Date(y, m + 1, 0).getDate();
                const today    = new Date();

                // 앞쪽 빈 칸
                for (let i = 0; i < firstDow; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cal-cell empty';
                    calBody.appendChild(cell);
                }

                // 날짜 칸
                for (let d = 1; d <= lastDay; d++) {
                    const cell = document.createElement('div');
                    cell.className = 'cal-cell';

                    const isToday = d === today.getDate() && m === today.getMonth() && y === today.getFullYear();
                    const dow = (firstDow + d - 1) % 7;

                    const dateNum = document.createElement('div');
                    dateNum.className = isToday ? 'cal-date is-today' : 'cal-date';
                    dateNum.textContent = d;
                    if (!isToday && dow === 0) dateNum.classList.add('text-red');
                    if (!isToday && dow === 6) dateNum.classList.add('text-blue');
                    cell.appendChild(dateNum);

                    const dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    cell.setAttribute('data-date', dateStr);

                    const evtWrap = document.createElement('div');
                    evtWrap.className = 'cal-events';
                    cell.appendChild(evtWrap);

                    calBody.appendChild(cell);
                }

                // 일정 붙이기
                if (dataBox) {
                    dataBox.querySelectorAll('.cal-raw-data').forEach((el, i) => {
                        const targetDate = el.getAttribute('data-date');
                        const title = el.getAttribute('data-title');
                        const time  = el.getAttribute('data-time') ? el.getAttribute('data-time').substring(0, 5) : '';

                        const targetCell = calBody.querySelector(`.cal-cell[data-date="${targetDate}"]`);
                        if (!targetCell) return;

                        const chip = document.createElement('div');
                        chip.className = `cal-event-chip ${colorPool[i % colorPool.length]}`;
                        chip.innerHTML = `<span class="time">${time}</span> ${title}`;
                        targetCell.querySelector('.cal-events').appendChild(chip);
                    });
                }
            }

            draw(cur);

            document.getElementById('btn-prev-month').addEventListener('click', () => {
                cur.setMonth(cur.getMonth() - 1);
                draw(cur);
            });
            document.getElementById('btn-next-month').addEventListener('click', () => {
                cur.setMonth(cur.getMonth() + 1);
                draw(cur);
            });
        });
    </script>
</body>
</html>
