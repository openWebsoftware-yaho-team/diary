<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEAM YAHO - 일정 관리 타임테이블 / 캘린더 다이어리</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <div th:replace="~{fragments/header :: header}"></div>

    <main class="main-content">
        <!-- 홈 화면 컨텐츠만 남김 (다른 페이지는 각각의 html 파일에서 렌더링) -->
        <div>
            <div class="icon-section">
                <div class="icon-circle">🤝</div>
                <div class="icon-circle">☁️</div>
                <div class="icon-circle">📞</div>
                <div class="icon-circle">🌱</div>
                <div class="icon-circle">📊</div>
            </div>

            <div class="section-title">
                중요하다고 표시해놓은 일정은 이렇게 맨 위에 띄워주는 것도 좋겠다
            </div>

            <table class="schedule-table">
                <thead>
                    <tr>
                        <th class="col-time">대충 시간</th>
                        <th class="col-title">일정</th>
                        <th class="col-memo">비고 (메모 같은거) 비워놔도 상관없음</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="row-purple">
                        <td class="col-time">00:00 ~ 00:30</td>
                        <td class="col-title">원신</td>
                        <td class="col-memo">이 안에도 체크리스트 같은거 넣을수도 있고</td>
                    </tr>
                    <tr class="row-yellow">
                        <td class="col-time">01:00 ~ 01:20</td>
                        <td class="col-title">칼바람</td>
                        <td class="col-memo">일 종류에 따라 행 색도 바꿀 수 있게 하면 좋겠다</td>
                    </tr>
                    <tr class="row-green">
                        <td class="col-time">01:20 ~ 01:30</td>
                        <td class="col-title">림버스</td>
                        <td class="col-memo">이런식으로 사용자가 스스로 작성하거나 아니면 AI한테 나 이렇게 할거야 하면 이제 AI가 자동으로 써준다거나 할 수 있나? 할 수 있겠지 안되면 울면서 수정함</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="/script.js"></script>
</body>
</html>
