<header th:fragment="header" class="header" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="header-container">
        <div class="logo" onclick="location.href='/'">YAHO<span> 일정 관리 타임테이블</span></div>

        <div class="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>

        <nav id="nav-menu" class="nav">
            <a href="/" class="nav-item">홈</a>
            <a href="/timeline" class="nav-item">타임라인</a>
            <a href="/calendar" class="nav-item">캘린더</a>
            <a href="/ai" class="nav-item">AI 도우미</a>

            <a href="/login" class="nav-item" sec:authorize="isAnonymous()">로그인</a>
            <a href="/signup" class="nav-item" sec:authorize="isAnonymous()">회원가입</a>

            <form action="/logout" method="post" class="logout-form" sec:authorize="isAuthenticated()">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="nav-item logout-btn">로그아웃</button>
            </form>
        </nav>
    </div>
</header>
